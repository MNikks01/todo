# Local full-stack environment (docs/docker.md §4). One command: `make up`.
# Browser loads the SPA from http://localhost:8080 and calls the API at
# http://localhost:3000 (same-site: both localhost). Cookies are non-Secure here
# because local is plain HTTP — NODE_ENV=development reflects that; staging/prod
# overrides (infrastructure/docker/compose/) run production + HTTPS.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # Mailpit (Mailhog successor) — local SMTP sink for when email lands (Phase 2+).
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025' # web UI
      - '1025:1025' # SMTP

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: '3000'
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/todo
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-secret-dev-secret-dev-secret-0123}
      JWT_ACCESS_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: '7'
      COOKIE_SECURE: 'false'
      CORS_ORIGINS: http://localhost:8080
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api/v1
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  mongo-data:
