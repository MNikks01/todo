# Dependabot — keep dependencies + actions patched (docs/security.md §8, A06).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/tooling bumps into one PR to reduce noise.
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /infrastructure/docker
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
