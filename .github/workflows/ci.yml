# CI — runs on every PR and push (docs/cicd.md §2).
# Quality gates (verify), E2E, security scans, and Docker image build validation.
# Deploy/push-to-ECR live in the cd-*.yml workflows (gated on AWS being configured).
name: CI

on:
  push:
    branches: [main, develop, qa, staging]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Coverage gates are enforced per workspace (vitest thresholds).
      - name: Test + coverage
        run: npm run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # webServer in playwright.config.ts boots the backend (ephemeral Mongo)
      # and the built SPA, so no external services are required.
      - name: Run E2E
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # required by the action to scan PRs

      # Install the Trivy binary directly (deterministic — avoids action tag drift).
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin"

      - name: Dependency & filesystem scan (Trivy)
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" fs . \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif

      - name: Upload Trivy SARIF
        # Upload findings even when the scan gate fails, but only if the file
        # was actually produced (e.g. skip when an earlier step aborted the job).
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  docker-build:
    name: Docker image build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build both images to validate the Dockerfiles on every PR (no push).
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/backend.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/frontend.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
