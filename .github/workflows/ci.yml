# CI — runs on every PR and push (docs/cicd.md §2).
# Phase 5: lint, typecheck, format, coverage-gated tests, and Playwright E2E.
# Security scans and Docker build/deploy stages are added in Phase 7.
name: CI

on:
  push:
    branches: [main, develop, qa, staging]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Coverage gates are enforced per workspace (vitest thresholds).
      - name: Test + coverage
        run: npm run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # webServer in playwright.config.ts boots the backend (ephemeral Mongo)
      # and the built SPA, so no external services are required.
      - name: Run E2E
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
