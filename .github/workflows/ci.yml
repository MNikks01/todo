# CI — runs on every PR and push (docs/cicd.md §2).
# Phase 1: lint, typecheck, test (passWithNoTests), format check. Security scans
# and Docker build/deploy stages are added in Phase 7.
name: CI

on:
  push:
    branches: [main, develop, qa, staging]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
