# Nginx config for the SPA (docs/docker.md §3, docs/security.md §8.3).
# Serves static assets, falls back to index.html for client-side routing, and
# sets the SPA Content-Security-Policy + security headers (resolves SF-6 at the
# edge). For non-local environments, replace connect-src with the real API origin.
#
# NOTE: nginx `add_header` does NOT inherit into a location that defines its own
# add_header, so the security headers are repeated in each location block.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets — cache hard.
    location /assets/ {
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:3000; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
    }

    # SPA fallback — every unknown path serves index.html (no-cache so deploys take effect).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:3000; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "no-cache" always;
    }
}
