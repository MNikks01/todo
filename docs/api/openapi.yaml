# OpenAPI specification — Todo API
# Status: auth + users (admin) endpoints implemented (Phase 2). Todos paths land in Phase 3.

openapi: 3.1.0
info:
  title: Todo API
  version: 0.0.0
  description: >
    Multi-user todo management API. Auth via short-lived access JWT (Bearer) + rotating
    refresh token (HttpOnly cookie). See docs/security.md and docs/architecture.md.
  contact:
    name: Owner
servers:
  - url: https://api.{domain}/api/v1
    description: Production
    variables:
      domain: { default: example.com }
  - url: http://localhost:3000/api/v1
    description: Local

tags:
  - name: auth
    description: Registration, login, refresh rotation, logout
  - name: todos
    description: Per-user todo CRUD, filtering, search
  - name: users
    description: Admin user management (RBAC)

# ---- Conventions (binding, even while paths are TBD) ----
# - All mutating requests validated with Zod at the boundary; invalid -> 400 Problem.
# - Protected routes require Authorization: Bearer <accessToken>.
# - Cookie endpoints (/auth/refresh, /auth/logout) require X-CSRF-Token (double-submit).
# - Errors use a consistent Problem shape (below); no internal details leaked.
# - List endpoints: cursor/offset pagination with capped page size; correlationId echoed in headers.

paths:
  /health:
    get:
      summary: Liveness probe
      tags: [auth]
      security: []
      responses:
        '200': { description: OK }
  /ready:
    get:
      summary: Readiness probe (DB/cache ping)
      tags: [auth]
      security: []
      responses:
        '200': { description: Ready }
        '503': { description: Not ready }
  /auth/register:
    post:
      summary: Register a new account
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties: { user: { $ref: '#/components/schemas/User' } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          {
            description: Email already registered,
            content: { application/json: { schema: { $ref: '#/components/schemas/Problem' } } },
          }
  /auth/login:
    post:
      summary: Log in; sets refresh + csrf cookies, returns an access token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK (Set-Cookie refreshToken HttpOnly + csrfToken)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/refresh:
    post:
      summary: Rotate the session (cookie + X-CSRF-Token double-submit)
      tags: [auth]
      security:
        - csrfToken: []
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /auth/logout:
    post:
      summary: Log out current session (clears cookies)
      tags: [auth]
      security:
        - csrfToken: []
      responses:
        '204': { description: No Content }
  /auth/logout-all:
    post:
      summary: Revoke all sessions for the current user
      tags: [auth]
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/me:
    get:
      summary: Current authenticated user
      tags: [auth]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { user: { $ref: '#/components/schemas/User' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /users:
    get:
      summary: List users (admin)
      tags: [users]
      parameters:
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
          }
        - { in: query, name: skip, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/{id}/role:
    patch:
      summary: Change a user's role (admin)
      tags: [users]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              {
                type: object,
                required: [role],
                properties: { role: { type: string, enum: [user, admin] } },
              }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
  /users/{id}/status:
    patch:
      summary: Enable/disable an account (admin)
      tags: [users]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              {
                type: object,
                required: [status],
                properties: { status: { type: string, enum: [active, disabled] } },
              }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
  # /todos (GET list, POST create), /todos/{id} (GET, PATCH, DELETE), /todos/{id}/restore — TBD Phase 3

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
  schemas:
    Problem:
      type: object
      description: Safe error envelope (no internal details).
      required: [error, message, correlationId]
      properties:
        error: { type: string, example: ValidationError }
        message: { type: string, example: 'title is required' }
        correlationId: { type: string, example: '01J...ULID' }
        details:
          type: array
          items: { type: object }
    User:
      type: object
      description: Safe user representation (never includes passwordHash).
      properties:
        id: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [user, admin] }
        status: { type: string, enum: [active, disabled] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Session:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        accessToken: { type: string, description: Short-lived JWT (send as Bearer) }
    # Todo, Pagination — TBD Phase 3
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    Unauthorized:
      description: Missing/invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    Forbidden:
      description: Authenticated but not allowed (RBAC/ownership)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource not found (also returned for cross-user access)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }

security:
  - bearerAuth: []
